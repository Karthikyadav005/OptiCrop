<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCrop - Smart Agriculture Engine</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="container">
        <h1>OptiCrop Engine 🌾</h1>
        <p class="subtitle">Enter soil and environmental conditions to find the optimal crop.</p>
        
        <form action="/predict" method="POST">
            <div class="form-group">
                <label>Nitrogen (N)</label>
                <input type="number" name="N" required step="any">
            </div>
            <div class="form-group">
                <label>Phosphorus (P)</label>
                <input type="number" name="P" required step="any">
            </div>
            <div class="form-group">
                <label>Potassium (K)</label>
                <input type="number" name="K" required step="any">
            </div>
            <div class="form-group">
                <label>Temperature (°C)</label>
                <input type="number" name="temperature" required step="any">
            </div>
            <div class="form-group">
                <label>Humidity (%)</label>
                <input type="number" name="humidity" required step="any">
            </div>
            <div class="form-group">
                <label>Soil pH</label>
                <input type="number" name="ph" required step="any">
            </div>
            <div class="form-group">
                <label>Rainfall (mm)</label>
                <input type="number" name="rainfall" required step="any">
            </div>
            <button type="submit">Predict Optimal Crop</button>
        </form>
    </div>
</body>
</html>
